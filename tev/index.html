<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEV · Token Enabled Value — Crypto3D</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t!=='dark')document.documentElement.setAttribute('data-theme','light')})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #050507;
      --bg-1: #0a0a0e;
      --bg-2: #101015;
      --bg-3: #16161c;
      --text-1: #e8e8ec;
      --text-2: #7a7a88;
      --text-3: #4a4a56;
      --text-4: #2e2e38;
      --border: rgba(255,255,255,0.06);
      --border-h: rgba(255,255,255,0.12);
      --green: #34d399;
      --green-d: rgba(52,211,153,0.08);
      --blue: #60a5fa;
      --blue-d: rgba(96,165,250,0.08);
      --purple: #a78bfa;
      --purple-d: rgba(167,139,250,0.08);
      --amber: #fbbf24;
      --amber-d: rgba(251,191,36,0.08);
      --red: #f87171;
      --header-bg: rgba(5,5,7,0.9);
    }
    [data-theme="light"] {
      --bg-0: #fafafa;
      --bg-1: #ffffff;
      --bg-2: #f3f3f6;
      --bg-3: #eaeaef;
      --text-1: #111118;
      --text-2: #5a5a6e;
      --text-3: #9090a0;
      --text-4: #c0c0cc;
      --border: rgba(0,0,0,0.06);
      --border-h: rgba(0,0,0,0.12);
      --green: #059669;
      --green-d: rgba(5,150,105,0.06);
      --blue: #2563eb;
      --blue-d: rgba(37,99,235,0.06);
      --purple: #7c3aed;
      --purple-d: rgba(124,58,237,0.06);
      --amber: #d97706;
      --amber-d: rgba(217,119,6,0.06);
      --red: #dc2626;
      --header-bg: rgba(250,250,250,0.92);
    }

    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.5}
    a{color:inherit;text-decoration:none}
    .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

    /* Header */
    header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .hd{max-width:1400px;margin:0 auto;padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
    .logo-m{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#000}
    .hd-r{display:flex;align-items:center;gap:20px}
    .ib{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .ib:hover{border-color:var(--border-h);color:var(--text-1)}
    .ib svg{width:15px;height:15px}
    .hd-nav{display:flex;gap:20px;list-style:none}
    .hd-nav a{font-size:13px;font-weight:500;color:var(--text-2);transition:color .15s}
    .hd-nav a:hover{color:var(--text-1)}
    @media(max-width:768px){.hd-nav{display:none}}
    .tt .sun{display:none}.tt .moon{display:block}
    [data-theme="light"] .tt .sun{display:block}
    [data-theme="light"] .tt .moon{display:none}
    @media(max-width:768px){.hd{padding:0 20px}}

    /* Page Header */
    .page-head{max-width:1400px;margin:0 auto;padding:48px 32px 32px}
    .page-eyebrow{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px}
    .page-title{font-size:42px;font-weight:900;letter-spacing:-0.03em;line-height:1.1;margin-bottom:12px}
    .page-desc{font-size:16px;color:var(--text-2);max-width:600px;line-height:1.6}
    @media(max-width:768px){.page-head{padding:32px 20px 24px}.page-title{font-size:28px}}

    /* Stats Summary */
    .stats-row{max-width:1400px;margin:0 auto;padding:0 32px 32px;display:flex;gap:48px;flex-wrap:wrap}
    .stat-item{display:flex;flex-direction:column;gap:4px}
    .stat-val{font-size:28px;font-weight:800;letter-spacing:-0.02em}
    .stat-lbl{font-size:12px;color:var(--text-3);font-weight:500}
    @media(max-width:768px){.stats-row{padding:0 20px 24px;gap:32px}}

    /* Filter Bar */
    .filter-bar{max-width:1400px;margin:0 auto;padding:0 32px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .filter-btn{font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:var(--border-h);color:var(--text-1)}
    .filter-btn.active{background:var(--green-d);border-color:var(--green);color:var(--green)}
    @media(max-width:768px){.filter-bar{padding:0 20px 20px}}

    /* Main Content */
    .main{max-width:1400px;margin:0 auto;padding:0 32px 80px}
    @media(max-width:768px){.main{padding:0 20px 56px}}

    /* Data Table */
    .data-table{width:100%;border-collapse:collapse;font-size:14px}
    .data-table th{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:52px;background:var(--bg-0)}
    .data-table td{padding:16px;border-bottom:1px solid var(--border);vertical-align:middle}
    .data-table tr:hover td{background:var(--bg-1)}
    .data-table a{display:flex;align-items:center;gap:12px}
    .data-table a:hover .proto-name{color:var(--green)}

    .proto-rank{font-size:12px;font-weight:700;color:var(--text-4);width:28px}
    .proto-icon{width:32px;height:32px;border-radius:8px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
    .proto-name{font-weight:700;font-size:15px;transition:color .15s}
    .proto-cat{font-size:11px;color:var(--text-3);margin-top:2px}
    .yield-val{font-weight:800;font-size:16px;color:var(--green)}
    .mech-tag{font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--bg-2);color:var(--text-2)}
    .mech-tag.burn{background:rgba(248,113,113,0.08);color:var(--red)}
    .mech-tag.div{background:var(--purple-d);color:var(--purple)}
    .mech-tag.buy{background:var(--green-d);color:var(--green)}
    .trend-spark{width:80px;height:24px}

    /* Footer */
    footer{border-top:1px solid var(--border);padding:32px 0}
    .ft{max-width:1400px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-3)}
    .ft-links{display:flex;gap:16px}
    .ft-links a{color:var(--text-3);transition:color .15s}
    .ft-links a:hover{color:var(--text-1)}
    @media(max-width:768px){.ft{flex-direction:column;gap:12px;text-align:center;padding:0 20px}}

    /* Reveal */
    .rv{opacity:0;transform:translateY(20px);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1)}
    .rv.vis{opacity:1;transform:none}
    @media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}
  </style>
  <link rel="stylesheet" href="../css/theme-override.css">
</head>
<body>

<header>
  <div class="hd">
    <a href="../" class="logo"><div class="logo-m">3D</div>Crypto3D</a>
    <div class="hd-r">
      <nav><ul class="hd-nav"><li><a href="../tev/">TEV</a></li><li><a href="../ahr999/">AHR999</a></li><li><a href="../mvrv/">MVRV</a></li><li><a href="../bmri/">BMRI</a></li><li><a href="../btc-dominance/">BTC.D</a></li></ul></nav>
      <button class="ib tt" id="tt" aria-label="切换主题">
        <svg class="moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
        <svg class="sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="page-head rv">
  <div class="page-eyebrow">Protocol Valuation</div>
  <h1 class="page-title">TEV · Token Enabled Value</h1>
  <p class="page-desc">追踪协议收益如何流向代币持有者——回购、销毁、分红等价值分配机制，量化代币价值捕获能力。</p>
</div>

<div class="stats-row rv">
  <div class="stat-item"><div class="stat-val mono" style="color:var(--green)">25+</div><div class="stat-lbl">覆盖协议</div></div>
  <div class="stat-item"><div class="stat-val mono">5</div><div class="stat-lbl">分配机制</div></div>
  <div class="stat-item"><div class="stat-val mono">$8.2B</div><div class="stat-lbl">年化价值分配</div></div>
  <div class="stat-item"><div class="stat-val mono" style="color:var(--blue)">24h</div><div class="stat-lbl">更新频率</div></div>
</div>

<div class="filter-bar rv">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="perps">Perps</button>
  <button class="filter-btn" data-filter="dex">DEX</button>
  <button class="filter-btn" data-filter="lending">Lending</button>
  <button class="filter-btn" data-filter="staking">Staking</button>
  <button class="filter-btn" data-filter="defi">DeFi</button>
</div>

<div class="main">
  <table class="data-table rv">
    <thead>
      <tr>
        <th>#</th>
        <th>协议</th>
        <th>TEV Yield</th>
        <th>机制</th>
        <th>30日趋势</th>
        <th>年化分配</th>
      </tr>
    </thead>
    <tbody id="proto-list">
      <!-- Dynamic content -->
    </tbody>
  </table>
</div>

<footer>
  <div class="ft">
    <span>© 2026 Crypto3D</span>
    <div class="ft-links">
      <a href="https://x.com/22333D" target="_blank">Twitter</a>
      <a href="https://www.youtube.com/@Crypto36D" target="_blank">YouTube</a>
      <a href="./governance/">治理动态</a>
    </div>
  </div>
</footer>

<script>
document.getElementById('tt').addEventListener('click',()=>{
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  isDark?document.documentElement.setAttribute('data-theme','light'):document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('theme',isDark?'light':'dark');
});

// Scroll reveal
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.08});
document.querySelectorAll('.rv').forEach((el,i)=>{el.style.transitionDelay=i*40+'ms';io.observe(el)});

// Protocol data
const protocols=[
  {rank:1,name:'Hyperliquid',cat:'Perps',yield:42.8,mech:'销毁',mechClass:'burn',annual:'$124M',trend:[38,40,39,41,42,43,42.8]},
  {rank:2,name:'dYdX',cat:'Perps',yield:18.3,mech:'分配',mechClass:'div',annual:'$89M',trend:[16,17,17.5,18,18.2,18.1,18.3]},
  {rank:3,name:'GMX',cat:'Perps',yield:12.6,mech:'分红',mechClass:'div',annual:'$52M',trend:[14,13.5,13,12.8,12.5,12.4,12.6]},
  {rank:4,name:'Curve',cat:'DEX',yield:8.9,mech:'分红',mechClass:'div',annual:'$38M',trend:[9.2,9.1,9.0,8.8,8.7,8.8,8.9]},
  {rank:5,name:'Aave',cat:'Lending',yield:5.2,mech:'回购',mechClass:'buy',annual:'$28M',trend:[4.8,4.9,5.0,5.1,5.2,5.2,5.2]},
  {rank:6,name:'PancakeSwap',cat:'DEX',yield:7.8,mech:'销毁',mechClass:'burn',annual:'$42M',trend:[8.2,8.0,7.9,7.8,7.7,7.8,7.8]},
  {rank:7,name:'Sushi',cat:'DEX',yield:4.2,mech:'分红',mechClass:'div',annual:'$18M',trend:[4.5,4.4,4.3,4.2,4.1,4.2,4.2]},
  {rank:8,name:'Compound',cat:'Lending',yield:3.1,mech:'回购',mechClass:'buy',annual:'$12M',trend:[2.8,2.9,3.0,3.1,3.2,3.1,3.1]},
  {rank:9,name:'Lido',cat:'Staking',yield:2.8,mech:'分红',mechClass:'div',annual:'$95M',trend:[2.5,2.6,2.7,2.8,2.9,2.8,2.8]},
  {rank:10,name:'Rocket Pool',cat:'Staking',yield:2.1,mech:'分红',mechClass:'div',annual:'$8M',trend:[1.9,2.0,2.0,2.1,2.1,2.1,2.1]},
];

function spark(data,color){
  const w=80,h=24,p=2;
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>[p+i/(data.length-1)*(w-p*2),h-p-(v-mn)/r*(h-p*2)]);
  const ln=pts.map(p=>p.join(',')).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" style="display:block;width:100%;height:100%"><polyline fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" points="${ln}"/></svg>`;
}

function render(filter){
  const list=document.getElementById('proto-list');
  const filtered=filter==='all'?protocols:protocols.filter(p=>p.cat.toLowerCase()===filter);
  list.innerHTML=filtered.map(p=>`
    <tr data-cat="${p.cat.toLowerCase()}">
      <td><span class="proto-rank mono">${p.rank}</span></td>
      <td>
        <a href="#">
          <div class="proto-icon">${p.name[0]}</div>
          <div>
            <div class="proto-name">${p.name}</div>
            <div class="proto-cat">${p.cat}</div>
          </div>
        </a>
      </td>
      <td><span class="yield-val mono">${p.yield}%</span></td>
      <td><span class="mech-tag ${p.mechClass}">${p.mech}</span></td>
      <td><div class="trend-spark">${spark(p.trend,'#34d399')}</div></td>
      <td><span class="mono">${p.annual}</span></td>
    </tr>
  `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>
<script src="../js/theme.js"></script>
</body>
</html>
