<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVRV — Crypto3D</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t!=='dark')document.documentElement.setAttribute('data-theme','light')})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #050507; --bg-1: #0a0a0e; --bg-2: #101015; --bg-3: #16161c;
      --text-1: #e8e8ec; --text-2: #7a7a88; --text-3: #4a4a56; --text-4: #2e2e38;
      --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.12);
      --green: #34d399; --green-d: rgba(52,211,153,0.08);
      --blue: #60a5fa; --blue-d: rgba(96,165,250,0.08);
      --purple: #a78bfa; --purple-d: rgba(167,139,250,0.08);
      --amber: #fbbf24; --amber-d: rgba(251,191,36,0.08);
      --red: #f87171; --header-bg: rgba(5,5,7,0.9);
    }
    [data-theme="light"] {
      --bg-0: #fafafa; --bg-1: #ffffff; --bg-2: #f3f3f6; --bg-3: #eaeaef;
      --text-1: #111118; --text-2: #5a5a6e; --text-3: #9090a0; --text-4: #c0c0cc;
      --border: rgba(0,0,0,0.06); --border-h: rgba(0,0,0,0.12);
      --green: #059669; --green-d: rgba(5,150,105,0.06);
      --blue: #2563eb; --blue-d: rgba(37,99,235,0.06);
      --purple: #7c3aed; --purple-d: rgba(124,58,237,0.06);
      --amber: #d97706; --amber-d: rgba(217,119,6,0.06);
      --red: #dc2626; --header-bg: rgba(250,250,250,0.92);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.5}
    a{color:inherit;text-decoration:none}
    .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
    header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .hd{max-width:1280px;margin:0 auto;padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
    .logo-m{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#000}
    .hd-r{display:flex;align-items:center;gap:16px}
    .nav-back{font-size:13px;font-weight:500;color:var(--text-2);transition:color .15s}
    .nav-back:hover{color:var(--text-1)}
    .ib{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .ib:hover{border-color:var(--border-h);color:var(--text-1)}
    .ib svg{width:15px;height:15px}
    .tt .sun{display:none}.tt .moon{display:block}
    [data-theme="light"] .tt .sun{display:block}
    [data-theme="light"] .tt .moon{display:none}
    @media(max-width:768px){.hd{padding:0 20px}}
    .page-head{max-width:1280px;margin:0 auto;padding:48px 32px 32px}
    .page-eyebrow{font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .page-eyebrow .badge{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--purple-d)}
    .page-title{font-size:42px;font-weight:900;letter-spacing:-0.03em;line-height:1.1;margin-bottom:12px}
    .page-desc{font-size:16px;color:var(--text-2);max-width:600px;line-height:1.6}
    @media(max-width:768px){.page-head{padding:32px 20px 24px}.page-title{font-size:28px}}
    .stats-row{max-width:1280px;margin:0 auto;padding:0 32px 32px;display:flex;gap:48px;flex-wrap:wrap}
    .stat-item{display:flex;flex-direction:column;gap:4px}
    .stat-val{font-size:28px;font-weight:800;letter-spacing:-0.02em}
    .stat-lbl{font-size:12px;color:var(--text-3);font-weight:500}
    @media(max-width:768px){.stats-row{padding:0 20px 24px;gap:32px}}
    .main{max-width:1280px;margin:0 auto;padding:0 32px 80px}
    @media(max-width:768px){.main{padding:0 20px 56px}}
    .chart-section{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:32px}
    .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .chart-title{font-size:18px;font-weight:700}
    .chart-period{display:flex;gap:8px}
    .period-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s}
    .period-btn:hover{border-color:var(--border-h);color:var(--text-1)}
    .period-btn.active{background:var(--purple-d);border-color:var(--purple);color:var(--purple)}
    .chart-area{height:300px}
    .chart-area svg{width:100%;height:100%;display:block}
    .gauge-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
    @media(max-width:768px){.gauge-section{grid-template-columns:1fr}}
    .gauge-card{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:28px}
    .gauge-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .gauge-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--purple-d)}
    .gauge-name{font-size:15px;font-weight:700}
    .gauge-value{font-size:48px;font-weight:900;letter-spacing:-0.04em;line-height:1;margin-bottom:12px}
    .gauge-zone{display:inline-block;font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px;margin-bottom:20px}
    .gauge-bar{height:10px;border-radius:5px;background:var(--bg-3);position:relative;overflow:hidden}
    .gauge-fill{height:100%;border-radius:5px;position:relative}
    .gauge-dot{position:absolute;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--bg-1)}
    .gauge-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;font-weight:600;color:var(--text-3)}
    .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media(max-width:768px){.info-grid{grid-template-columns:1fr}}
    .info-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:20px}
    .info-label{font-size:11px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
    .info-value{font-size:20px;font-weight:800;letter-spacing:-0.02em}
    footer{border-top:1px solid var(--border);padding:32px 0}
    .ft{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-3)}
    .ft-links{display:flex;gap:16px}
    .ft-links a{color:var(--text-3);transition:color .15s}
    .ft-links a:hover{color:var(--text-1)}
    @media(max-width:768px){.ft{flex-direction:column;gap:12px;text-align:center;padding:0 20px}}
    .rv{opacity:0;transform:translateY(20px);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1)}
    .rv.vis{opacity:1;transform:none}
    @media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}
  </style>
</head>
<body>
<header>
  <div class="hd">
    <a href="../" class="logo"><div class="logo-m">3D</div>Crypto3D</a>
    <div class="hd-r">
      <a href="../" class="nav-back">← 返回首页</a>
      <button class="ib tt" id="tt" aria-label="切换主题">
        <svg class="moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
        <svg class="sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="page-head rv">
  <div class="page-eyebrow">BTC Cycle <span class="badge">Live</span></div>
  <h1 class="page-title">MVRV</h1>
  <p class="page-desc">市值与实现价值比率（Market Value to Realized Value），用于判断比特币整体估值水平和周期顶底位置。</p>
</div>

<div class="stats-row rv">
  <div class="stat-item"><div class="stat-val mono" style="color:var(--amber)">1.29</div><div class="stat-lbl">当前值</div></div>
  <div class="stat-item"><div class="stat-val mono" style="color:var(--amber)">合理区</div><div class="stat-lbl">状态</div></div>
  <div class="stat-item"><div class="stat-val mono" style="color:var(--red)">-1.4%</div><div class="stat-lbl">7日变化</div></div>
  <div class="stat-item"><div class="stat-val mono">29%</div><div class="stat-lbl">持币盈利</div></div>
</div>

<div class="main">
  <div class="chart-section rv">
    <div class="chart-header">
      <div class="chart-title">历史走势</div>
      <div class="chart-period">
        <button class="period-btn">7D</button>
        <button class="period-btn active">30D</button>
        <button class="period-btn">1Y</button>
        <button class="period-btn">ALL</button>
      </div>
    </div>
    <div class="chart-area"><svg id="main-chart" viewBox="0 0 1216 300" preserveAspectRatio="none"></svg></div>
  </div>

  <div class="gauge-section rv">
    <div class="gauge-card">
      <div class="gauge-head"><div class="gauge-icon">📊</div><div class="gauge-name">当前区间</div></div>
      <div class="gauge-value mono" style="color:var(--amber)">1.29</div>
      <div class="gauge-zone" style="color:var(--amber);background:var(--amber-d)">合理区</div>
      <div class="gauge-bar">
        <div class="gauge-fill" style="width:32%;background:linear-gradient(90deg,var(--green),var(--amber))">
          <div class="gauge-dot" style="right:-7px;background:var(--amber)"></div>
        </div>
      </div>
      <div class="gauge-labels"><span>0</span><span>1 低估</span><span>3</span><span>4 过热</span></div>
    </div>
    <div class="gauge-card">
      <div class="gauge-head"><div class="gauge-icon">📈</div><div class="gauge-name">历史分位</div></div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">
        <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:var(--green)">低估区 (&lt;1.0)</span><span class="mono" style="font-weight:700">12%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:var(--amber)">合理区 (1.0-3.0)</span><span class="mono" style="font-weight:700">68%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:var(--red)">过热区 (&gt;3.0)</span><span class="mono" style="font-weight:700">20%</span></div>
      </div>
    </div>
  </div>

  <div class="info-grid rv">
    <div class="info-card"><div class="info-label">市值</div><div class="info-value mono">$1.38T</div></div>
    <div class="info-card"><div class="info-label">实现价值</div><div class="info-value mono">$1.07T</div></div>
    <div class="info-card"><div class="info-label">持币盈利</div><div class="info-value mono" style="color:var(--amber)">29%</div></div>
  </div>
</div>

<footer>
  <div class="ft">
    <span>© 2026 Crypto3D</span>
    <div class="ft-links">
      <a href="https://x.com/22333D" target="_blank">Twitter</a>
      <a href="https://www.youtube.com/@Crypto36D" target="_blank">YouTube</a>
    </div>
  </div>
</footer>

<script>
document.getElementById('tt').addEventListener('click',()=>{
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  isDark?document.documentElement.setAttribute('data-theme','light'):document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('theme',isDark?'light':'dark');
});
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.08});
document.querySelectorAll('.rv').forEach((el,i)=>{el.style.transitionDelay=i*40+'ms';io.observe(el)});
(function(){
  const svg=document.getElementById('main-chart');if(!svg)return;
  const w=1216,h=300,p=20,data=[];
  for(let i=0;i<90;i++)data.push(1.1+Math.sin(i*0.08)*0.3+Math.random()*0.1);
  data.push(1.29);
  const mn=0,mx=4,r=mx-mn;
  const pts=data.map((v,i)=>[p+i/(data.length-1)*(w-p*2),h-p-(v-mn)/r*(h-p*2)]);
  const ln=pts.map(p=>p.join(',')).join(' ');
  const fill=ln+` ${w-p},${h-p} ${p},${h-p}`;
  svg.innerHTML=`<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient></defs><polygon fill="url(#cg)" points="${fill}"/><polyline fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" points="${ln}"/><circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4" fill="#a78bfa"/>`;
})();
</script>
</body>
</html>
